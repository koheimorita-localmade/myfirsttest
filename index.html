<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <title>AI翻訳 - Gemini Translator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <h1>AI翻訳</h1>
            <button id="settings-btn" class="icon-btn" aria-label="設定">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </header>

        <!-- Language Selector -->
        <div class="lang-selector">
            <div class="lang-box">
                <label for="source-lang">翻訳元</label>
                <select id="source-lang">
                    <option value="auto">自動検出</option>
                    <option value="ja">日本語</option>
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                    <option value="ko">한국어</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="pt">Português</option>
                    <option value="th">ไทย</option>
                    <option value="vi">Tiếng Việt</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
            <button id="swap-btn" class="swap-btn" aria-label="言語を入れ替え">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M7 16l-4-4m0 0l4-4m-4 4h18M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
            </button>
            <div class="lang-box">
                <label for="target-lang">翻訳先</label>
                <select id="target-lang">
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="zh">中文</option>
                    <option value="ko">한국어</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="pt">Português</option>
                    <option value="th">ไทย</option>
                    <option value="vi">Tiếng Việt</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
        </div>

        <!-- Input Area -->
        <div class="text-area-container">
            <textarea id="source-text" placeholder="翻訳したいテキストを入力..." rows="5"></textarea>
            <div class="input-actions">
                <span id="char-count" class="char-count">0文字</span>
                <button id="clear-btn" class="text-btn" style="display:none;">クリア</button>
            </div>
        </div>

        <!-- Translate Button -->
        <button id="translate-btn" class="translate-btn" disabled>
            <span class="btn-text">翻訳する</span>
            <span class="btn-loading" style="display:none;">
                <span class="spinner"></span>翻訳中...
            </span>
        </button>

        <!-- Result Area -->
        <div id="result-container" class="result-container" style="display:none;">
            <div class="result-header">
                <span id="result-lang" class="result-lang"></span>
                <button id="copy-btn" class="text-btn">コピー</button>
            </div>
            <div id="result-text" class="result-text"></div>
        </div>

        <!-- History -->
        <div id="history-container" class="history-container" style="display:none;">
            <div class="history-header">
                <h2>履歴</h2>
                <button id="clear-history-btn" class="text-btn">すべて削除</button>
            </div>
            <div id="history-list" class="history-list"></div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal" style="display:none;">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>設定</h2>
                    <button id="close-settings" class="icon-btn" aria-label="閉じる">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="api-key">Gemini API キー</label>
                        <p class="form-hint">Google AI Studio (<a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com</a>) から取得できます</p>
                        <div class="api-key-input">
                            <input type="password" id="api-key" placeholder="APIキーを入力...">
                            <button id="toggle-key" class="icon-btn" aria-label="表示切替">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button id="save-key" class="translate-btn" style="margin-top:12px;">保存する</button>
                    <p id="key-status" class="key-status"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
