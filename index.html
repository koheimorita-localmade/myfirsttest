<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <title>AI翻訳 - Gemini Translator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <h1>AI翻訳</h1>
            <button id="settings-btn" class="icon-btn" aria-label="設定">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </header>

        <!-- Language Selector -->
        <div class="lang-selector">
            <div class="lang-box">
                <label for="source-lang">翻訳元</label>
                <select id="source-lang">
                    <option value="auto">自動検出</option>
                    <option value="ja">日本語</option>
                    <option value="en">English</option>
                    <option value="zh">中文</option>
                    <option value="ko">한국어</option>
                    <option value="tl">Tagalog</option>
                    <option value="id">Indonesia</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="pt">Português</option>
                    <option value="th">ไทย</option>
                    <option value="vi">Tiếng Việt</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
            <button id="swap-btn" class="swap-btn" aria-label="言語を入れ替え">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M7 16l-4-4m0 0l4-4m-4 4h18M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
            </button>
            <div class="lang-box">
                <label for="target-lang">翻訳先</label>
                <select id="target-lang">
                    <option value="auto">自動</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="zh">中文</option>
                    <option value="ko">한국어</option>
                    <option value="tl">Tagalog</option>
                    <option value="id">Indonesia</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="pt">Português</option>
                    <option value="th">ไทย</option>
                    <option value="vi">Tiếng Việt</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
        </div>

        <!-- Favorite Languages -->
        <div class="favorites-bar">
            <div id="favorites-list" class="favorites-list"></div>
            <button id="edit-favorites-btn" class="icon-btn fav-edit-btn" aria-label="お気に入り編集">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            </button>
        </div>

        <!-- Input Area -->
        <div class="text-area-container">
            <textarea id="source-text" placeholder="翻訳したいテキストを入力..." rows="5"></textarea>
            <div class="input-tools">
                <button id="upload-btn" class="tool-btn" aria-label="ファイル・写真を読み込み">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                    <span>ファイル</span>
                </button>
                <input type="file" id="file-input" accept=".txt,.csv,.md,.json,.html,.xml,image/*" hidden>
                <button id="camera-btn" class="tool-btn" aria-label="カメラで撮影">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
                    </svg>
                    <span>カメラ</span>
                </button>
                <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
                <button id="mic-btn" class="tool-btn" aria-label="音声入力">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <span>音声</span>
                </button>
            </div>
            <div class="input-actions">
                <span id="char-count" class="char-count">0文字</span>
                <button id="clear-btn" class="text-btn" style="display:none;">クリア</button>
            </div>
        </div>

        <!-- Translate Button -->
        <button id="translate-btn" class="translate-btn" disabled>
            <span class="btn-text">翻訳する</span>
            <span class="btn-loading" style="display:none;">
                <span class="spinner"></span>翻訳中...
            </span>
        </button>

        <!-- Result Area -->
        <div id="result-container" class="result-container" style="display:none;">
            <!-- Style Tabs -->
            <div class="style-tabs">
                <button class="style-tab active" data-style="normal">ノーマル</button>
                <button class="style-tab" data-style="casual">カジュアル</button>
                <button class="style-tab" data-style="formal">フォーマル</button>
                <button class="style-tab" data-style="advanced">アドバンス</button>
            </div>

            <div class="result-header">
                <span id="result-lang" class="result-lang"></span>
                <div class="result-actions">
                    <button id="speak-btn" class="icon-btn" aria-label="音声再生">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                    </button>
                    <button id="copy-btn" class="text-btn">コピー</button>
                </div>
            </div>
            <div id="result-text" class="result-text"></div>

            <!-- Learning Notes -->
            <div id="learning-section" class="learning-section" style="display:none;">
                <div class="learning-header">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                    <span>学習メモ</span>
                </div>
                <div id="learning-notes" class="learning-notes"></div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal" style="display:none;">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>設定</h2>
                    <button id="close-settings" class="icon-btn" aria-label="閉じる">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="api-key">Gemini API キー</label>
                        <p class="form-hint">Google AI Studio (<a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com</a>) から取得できます</p>
                        <div class="api-key-input">
                            <input type="password" id="api-key" placeholder="APIキーを入力...">
                            <button id="toggle-key" class="icon-btn" aria-label="表示切替">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button id="save-key" class="translate-btn" style="margin-top:12px;">保存する</button>
                    <p id="key-status" class="key-status"></p>
                </div>
            </div>
        </div>

        <!-- Favorites Editor Modal -->
        <div id="favorites-modal" class="modal" style="display:none;">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>お気に入り言語</h2>
                    <button id="close-favorites" class="icon-btn" aria-label="閉じる">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <p class="form-hint">タップして追加・削除できます。</p>
                    <div id="favorites-editor" class="favorites-editor"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
